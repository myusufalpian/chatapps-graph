spring:
  application:
    name: test-chatapps
    minio:
      endpoint: http://localhost:9000
      access-key: test
      secret-key: test
      bucket: test-bucket
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms

auth:
  otp:
    duration: 3
    prefix: "login:otp:"
    max-count: 3
    max-attempts: 5
    cooldown-seconds: 60
    otp-length: 6
    max-ip-count: 10
    ip-window-seconds: 3600

