server:
  port: 8084

spring:
  application:
    name: chatapps-graph
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8080/realms/chatapps-realm}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:8080/realms/chatapps-realm/protocol/openid-connect/certs}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${SHOW_SQL}
    properties:
      hibernate:
        format_sql: ${FORMAT_SQL}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: chatapps
    schemas: chatapps
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      timeout: 2000ms
      jedis:
        pool:
          enabled: true
          min-idle: 2
          max-idle: 10
          max-active: 10
          max-wait: 2000ms
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  threads:
    virtual:
      enabled: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.timeout: 5000

auth:
  otp:
    duration: 3
    prefix: "login:otp:"
    max-count: 3
    max-attempts: 5
    cooldown-seconds: 60
    otp-length: 6
    max-ip-count: 10
    ip-window-seconds: 3600

jwt:
  auth:
    converter:
      resource-id: chatapps-client
      principal-attribute: preferred_username

application:
  minio:
    endpoint: ${APPLICATION_MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET}
  keycloak:
    token-uri: http://localhost:8180/realms/chatapps-realm/protocol/openid-connect/token
    client-id: ${KEYCLOAK-CLIENT}
    client-secret: ${KEYCLOAK_SECRET}
    grant-type: "urn:ietf:params:oauth:grant-type:token-exchange"

logging:
  level:
    root: INFO

app:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  identity:
    cache-ttl-seconds: ${APP_IDENTITY_CACHE_TTL:3600}
  cache:
    mode: ${APP_CACHE_MODE:REDIS}
    global-prefix: "user"
    default-ttl-seconds: 86400
    in-memory-max-size: 1000

notification:
  whatsapp:
    fonnte:
      api-url: ${FONNTE_API_URL:https://api.fonnte.com/send}
      api-token: ${FONNTE_API_TOKEN:}
    wablas:
      api-url: ${WABLAS_API_URL:https://api.wablas.com/api/send-message}
      api-token: ${WABLAS_API_TOKEN:}

resilience4j:
  circuitbreaker:
    instances:
      whatsapp-primary:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

chat:
  rate-limit:
    message-per-minute: 30
    reaction-per-minute: 60
  edit:
    max-window-minutes: 30

media:
  max-file-size: 20971520
  image:
    max-dimension: 1920
    quality: 85
    thumbnail-dimension: 200
    thumbnail-quality: 60
  video:
    thumbnail-timeout-seconds: 10

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

group:
  max-members: 200
  avatar:
    max-dimension: 500
    quality: 85

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8085}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: unrestricted
