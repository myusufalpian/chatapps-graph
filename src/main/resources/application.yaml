server:
  port: 8084

spring:
  application:
    name: chatapps-graph
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8080/realms/chatapps-realm}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:8080/realms/chatapps-realm/protocol/openid-connect/certs}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${SHOW_SQL}
    properties:
      hibernate:
        format_sql: ${FORMAT_SQL}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: chatapps
    schemas: chatapps
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      timeout: 2000ms
      jedis:
        pool:
          enabled: true
          min-idle: 2
          max-idle: 10
          max-active: 10
          max-wait: 2000ms
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  threads:
    virtual:
      enabled: true

jwt:
  auth:
    converter:
      resource-id: chatapps-client
      principal-attribute: preferred_username

application:
  minio:
    endpoint: ${APPLICATION_MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET}
  keycloak:
    token-uri: http://localhost:8180/realms/chatapps-realm/protocol/openid-connect/token
    client-id: ${KEYCLOAK-CLIENT}
    client-secret: ${KEYCLOAK_SECRET}

logging:
  level:
    root: INFO