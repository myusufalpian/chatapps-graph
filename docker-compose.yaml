services:
  postgres:
    image: postgres:17-alpine
    container_name: chatapps-postgre
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=chatapps
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: chatapps-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data: